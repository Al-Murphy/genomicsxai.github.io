{{- $opts := dict "minify" hugo.IsProduction "format" "esm" -}}
{{- $galleryScript := resources.Get "ts/gallery.ts" | js.Build $opts -}}

{{ $style := .Site.Data.external.PhotoSwipe.Style }}
{{ $core := .Site.Data.external.PhotoSwipe.Core }}
{{ $lightbox := .Site.Data.external.PhotoSwipe.Lightbox }}

<script type="module">
    import gallery from '{{ $galleryScript.RelPermalink }}';

    const mainArticle = document.querySelector('.main-article');
    const hasImageLinks = mainArticle && mainArticle.querySelectorAll('figure a.image-link').length > 0;

    if (hasImageLinks) {
        gallery(mainArticle);

        const PhotoSwipeLightbox = (await import("{{ $lightbox | safeJS }}")).default;
        const styleHref = "{{ $style | safeJS }}";

        const styleTag = document.createElement('link');
        styleTag.rel = 'stylesheet';
        styleTag.href = styleHref;
        document.head.appendChild(styleTag);

        const lightbox = new PhotoSwipeLightbox({
            gallerySelector: '.main-article',
            childSelector: 'figure a.image-link',
            pswpModule: () => import("{{ $core | safeJS }}"),
            initialZoomLevel: 'fit',
            secondaryZoomLevel: 2.5,
            maxZoomLevel: 8
        });

        lightbox.on('uiRegister', function () {
            const zoomStep = 1.4;
            const minZoom = 0.5;
            lightbox.pswp.ui.registerElement({
                name: 'zoom-in',
                order: 9,
                isButton: true,
                ariaLabel: 'Zoom in',
                html: '<svg aria-hidden="true" class="pswp__icn" viewBox="0 0 32 32" width="32" height="32"><path d="M18 14h-4v-4h-2v4H8v2h4v4h2v-4h4v-2z"/></svg>',
                onClick: (e, el) => {
                    const pswp = lightbox.pswp;
                    if (!pswp.currSlide) return;
                    const curr = pswp.currSlide.currZoomLevel;
                    const next = Math.min(8, curr * zoomStep);
                    if (next > curr) pswp.currSlide.zoomTo(next, { x: 0, y: 0 }, 200, false);
                }
            });
            lightbox.pswp.ui.registerElement({
                name: 'zoom-out',
                order: 9,
                isButton: true,
                ariaLabel: 'Zoom out',
                html: '<svg aria-hidden="true" class="pswp__icn" viewBox="0 0 32 32" width="32" height="32"><path d="M8 14h16v2H8z"/></svg>',
                onClick: (e, el) => {
                    const pswp = lightbox.pswp;
                    if (!pswp.currSlide) return;
                    const curr = pswp.currSlide.currZoomLevel;
                    const next = Math.max(minZoom, curr / zoomStep);
                    if (next < curr) pswp.currSlide.zoomTo(next, { x: 0, y: 0 }, 200, false);
                }
            });
        });

        lightbox.on('uiRegister', function () {
            lightbox.pswp.ui.registerElement({
                name: 'custom-caption',
                order: 9,
                isButton: false,
                appendTo: 'root',
                html: '',
                onInit: (el, pswp) => {
                    el.classList.add('pswp__custom-caption');
                    const unescape = (html) => {
                        if (!html) return '';
                        const div = document.createElement('div');
                        div.innerHTML = html.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
                        return div.textContent || div.innerText || '';
                    };
                    const updateCaption = () => {
                        const slide = pswp.currSlide;
                        let caption = '';
                        if (slide && slide.data && slide.data.element) {
                            const img = slide.data.element.querySelector('img');
                            if (img) {
                                const raw = img.getAttribute('data-title-escaped') || img.getAttribute('title') || img.getAttribute('alt') || '';
                                caption = raw ? unescape(raw) : '';
                            }
                        }
                        el.textContent = caption;
                        el.style.display = caption ? 'block' : 'none';
                    };
                    pswp.on('change', updateCaption);
                    pswp.on('contentLoad', updateCaption);
                }
            });
        });

        lightbox.init();
    }
</script>
