baseURL = "https://genomicsxai.github.io/"
title = "Genomics x AI"
theme = "Stack"
enableRobotsTXT = true
enableGitInfo = true

# So image attributes (e.g. {width=400px}) apply to the image, not the wrapping <p>
[markup.goldmark.renderer]
  unsafe = true

[markup.goldmark.parser]
  wrapStandAloneImageWithinParagraph = false

[markup.goldmark.parser.attribute]
  block = true

# TOC: only ## and ### (exclude #### and deeper)
[markup.tableOfContents]
  endLevel = 3
  startLevel = 2

[permalinks]
  # Page section: /forum/, /policies/, etc. (Stack theme convention)
  page = "/:slug/"

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  # Include blogs section in main sections for homepage
  mainSections = ["blogs", "post"]

[params.article]
  # Enable KaTeX math on all blog posts (inline $...$ and block $$...$$)
  math = true

# Comments: set enabled = true and add Giscus IDs from https://giscus.app (use repo genomicsxai/genomicsxai.github.io)
[params.comments]
  # Giscus comments + like/comment counts are enabled globally.
  # Fill in repoID and categoryID from giscus.app for genomicsxai/genomicsxai.github.io.
  enabled = true
  provider = "giscus"
  [params.comments.giscus]
    repo = "genomicsxai/genomicsxai.github.io"
    repoID = "R_kgDORSkFQA"
    category = "Post discussions"
    categoryID = "DIC_kwDORSkFQM4C2vT7"
    mapping = "pathname"
    strict = 0
    reactionsEnabled = 1
    emitMetadata = 1
    inputPosition = "bottom"
    lightTheme = "light"
    darkTheme = "dark_dimmed"
    lang = "en"
    loading = "lazy"

# Homepage right sidebar: filter by tags, scope, audience, lab, author, and archives by year
# Page (blog post) right sidebar: table of contents by default
[params.widgets]
  homepage = [
    { type = "taxonomy", params = { taxonomy = "tags", title = "Scientific tags", limit = 20, showLink = true, icon = "tag" } },
    { type = "taxonomy", params = { taxonomy = "scope", title = "Scope", limit = 15, showLink = true, icon = "hash" } },
    { type = "taxonomy", params = { taxonomy = "audience", title = "Audience", limit = 10, showLink = true, icon = "user" } },
    { type = "taxonomy", params = { taxonomy = "labs", title = "Lab", limit = 15, showLink = true, icon = "home" } },
    { type = "taxonomy", params = { taxonomy = "authors", title = "Author", limit = 15, showLink = true, icon = "user" } },
    { type = "archives", params = { limit = 10 } },
  ]
  page = [
    { type = "post-actions" },
    { type = "toc" },
  ]

[taxonomies]
  tag = "tags"                # scientific tags
  scope = "scope"                #other tags
  audience = "audience"
  lab = "labs"
  author = "authors"
  category = "categories"

# Main navigation menu
[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "forum"
  name = "Forum"
  url = "/forum/"
  weight = 2

[[menu.main]]
  identifier = "editorial-board"
  name = "Editorial Board"
  url = "/editorial-board/"
  weight = 3

[[menu.main]]
  identifier = "editorial-review"
  name = "Editorial Review"
  url = "/editorial-review/"
  weight = 4

[[menu.main]]
  identifier = "submission-guidelines"
  name = "Submission Guidelines"
  url = "/submission-guidelines/"
  weight = 5

[[menu.main]]
  identifier = "policies"
  name = "Policies"
  url = "/policies/"
